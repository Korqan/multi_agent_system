<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Q&A - DS-STAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/ui/styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <h1>DS-STAR Knowledge</h1>
            </div>
            <div class="header-actions">
                <a href="/ui/index.html" class="nav-btn active">Q&A Chat</a>
                <a href="/ui/ingest.html" class="nav-btn">Ingestion</a>
            </div>
        </header>

        <main class="main-content">
            <section class="chat-section glass-panel flex-column">
                <div class="chat-header">
                    <div class="form-group inline-group">
                        <label for="industrySelect">Select Knowledge Base:</label>
                        <div class="select-wrapper slim-select">
                            <select id="industrySelect" name="industry_id" required>
                                <option value="" disabled selected>Loading...</option>
                            </select>
                            <svg class="select-icon slim" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chatArea">
                    <div class="message system-message">
                        <div class="message-content">
                            <p>Welcome to DS-STAR Knowledge Q&A. Please select an industry knowledge base from the top
                                dropdown to start asking questions.</p>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <form id="chatForm">
                        <div class="input-wrapper">
                            <textarea id="questionInput" placeholder="Ask a question about the industry knowledge..."
                                rows="1" required></textarea>
                            <button type="submit" id="sendBtn" class="send-btn" disabled>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="/ui/chat.js"></script>
</body>

</html>
