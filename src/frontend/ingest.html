<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/ui/styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
                <h1>DS-STAR Knowledge</h1>
            </div>
            <div class="header-actions">
                <a href="/ui/index.html" class="nav-btn">Q&A Chat</a>
                <a href="/ui/ingest.html" class="nav-btn active">Ingestion</a>
            </div>
        </header>

        <main class="main-content">
            <section class="upload-section glass-panel">
                <div class="section-header">
                    <h2>Upload Document</h2>
                    <p>Add new knowledge to specific industry vectors.</p>
                </div>

                <form id="uploadForm" class="upload-form">
                    <div class="form-group">
                        <label for="industrySelect">Target Industry</label>
                        <div class="select-wrapper">
                            <select id="industrySelect" name="industry_id" required>
                                <option value="" disabled selected>Loading industries...</option>
                            </select>
                            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>

                    <div class="form-group upload-area-container">
                        <label>Document File</label>
                        <div class="upload-area" id="dropZone">
                            <input type="file" id="fileInput" name="files" accept=".pdf,.doc,.docx" multiple required
                                hidden>
                            <div class="upload-icon">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <h3 class="upload-title">Drop files here, or <span class="browse-text">browse</span></h3>
                            <p class="upload-hint">Supports multiple PDF, DOC, DOCX up to 50MB each</p>
                        </div>
                    </div>

                    <div id="fileListContainer" class="file-list-container hidden">
                        <div class="file-list-header">
                            <span>Selected Files (<span id="fileCount">0</span>)</span>
                            <button type="button" id="clearAllBtn" class="clear-btn text-btn">Clear All</button>
                        </div>
                        <ul id="fileList" class="file-list"></ul>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="primary-btn" disabled>
                            <span class="btn-text">Ingest to Vector DB</span>
                            <span class="loader hidden"></span>
                        </button>
                    </div>
                </form>

                <div id="statusMessage" class="status-message hidden">
                    <div class="status-icon"></div>
                    <div class="status-content">
                        <h4 id="statusTitle">Success</h4>
                        <p id="statusDesc">Document ingested successfully.</p>
                    </div>
                    <button class="close-status">×</button>
                </div>
            </section>
        </main>
    </div>

    <script src="/ui/app.js"></script>
</body>

</html>
